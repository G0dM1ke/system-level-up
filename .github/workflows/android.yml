name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create Flutter project
        run: |
          rm -rf app
          mkdir -p app
          cd app
          flutter create --platforms=android --org com.g0dm1ke.system --project-name system_level_up .

      - name: Copy SYSTEM source
        run: |
          cp src/pubspec.yaml app/pubspec.yaml
          rm -rf app/lib
          cp -R src/lib app/lib

      - name: Build release APK
        run: |
          cd app
          flutter pub get
          flutter build apk --release

      - name: Find APK
        run: |
          find . -name "*.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: SYSTEM-release-apk
          path: "**/*.apk"
