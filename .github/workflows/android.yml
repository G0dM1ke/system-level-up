name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create Flutter project
        run: |
          rm -rf app
          mkdir -p app
          cd app
          flutter create --platforms=android --org com.g0dm1ke.system --project-name system_level_up .

      - name: Copy SYSTEM source into project
        run: |
          cp src/pubspec.yaml app/pubspec.yaml
          rm -rf app/lib
          cp -R src/lib app/lib

      - name: Flutter doctor
        run: |
          cd app
          flutter doctor -v

      - name: Pub get (verbose)
        run: |
          cd app
          flutter pub get -v

      - name: Build release APK (VERBOSE + save log)
        run: |
          cd app
          flutter build apk --release -v 2>&1 | tee ../build-log.txt

      - uses: actions/upload-artifact@v4
        with:
          name: SYSTEM-build-logs
          path: build-log.txt

      - uses: actions/upload-artifact@v4
        with:
          name: SYSTEM-release-apk
          path: app/build/app/outputs/flutter-apk/app-release.apk
